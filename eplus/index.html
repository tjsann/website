  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif;color:var(--text);background:#000;font-size:15px;line-height:1.5;}
  body{display:flex;justify-content:center;min-height:100vh;}
  /* iPhone 15 Pro Max: 430 x 932 CSS px */
  .device{
    width:100%;max-width:430px;min-height:100vh;
    background:#fff;position:relative;overflow:hidden;
    display:flex;flex-direction:column;
  }

  /* ===== 共通: トップヘッダー（一覧用） ===== */
  .home-header{
    background:#fff;
    border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:5;
  }
  .home-header .tabs{
    display:flex;padding:8px 12px 0;gap:14px;justify-content:center;
  }
  .home-header .tabs button{
    background:none;border:none;color:var(--sub);font-size:14px;
    padding:10px 4px 12px;cursor:pointer;font-weight:500;
    border-bottom:3px solid transparent;
  }
  .home-header .tabs button.active{
    color:var(--pink);border-bottom-color:var(--pink);font-weight:700;
  }
  .home-header .subtabs{
    display:flex;padding:0 16px;border-bottom:1px solid var(--line);background:#fff;
  }
  .home-header .subtabs button{
    flex:1;background:none;border:none;color:var(--sub);font-size:14px;
    padding:12px 0;cursor:pointer;
    border-bottom:2px solid transparent;margin-bottom:-1px;
  }
  .home-header .subtabs button.active{
    color:var(--pink);border-bottom-color:var(--pink);font-weight:700;
  }
  .home-header .top-icons{
    background:var(--pink);height:10px;
  }
  .config-gear{display:none;}

  /* ===== 一覧画面 ===== */
  .list-area{flex:1;padding:14px 12px 80px;background:var(--bg);overflow-y:auto;}
  .pill-label{
    text-align:center;background:var(--pink);color:#fff;
    border-radius:22px;padding:10px 22px;font-size:14px;font-weight:700;
    margin:6px auto 16px;display:inline-block;
  }
  .pill-wrap{text-align:center;}
  .ticket-card{
    background:#fff;border-radius:8px;overflow:hidden;
    box-shadow:0 1px 3px rgba(0,0,0,.08);
    margin-bottom:14px;cursor:pointer;
    position:relative;
  }
  .ticket-card .ribbon{
    position:absolute;top:10px;left:10px;z-index:2;
    background:var(--pink);color:#fff;font-size:12px;font-weight:700;
    padding:4px 12px;border-radius:3px;letter-spacing:.05em;
  }
  .ticket-card .poster{
    width:100%;height:180px;
    background:
      radial-gradient(ellipse 60% 50% at 50% 35%, #FFB8D8 0%, #E48BB6 18%, transparent 55%),
      radial-gradient(ellipse 30% 40% at 25% 45%, #F39ECE 0%, transparent 60%),
      radial-gradient(ellipse 35% 45% at 78% 50%, #DD7AAE 0%, transparent 55%),
      radial-gradient(circle at 30% 30%, rgba(255,255,255,.35) 0, transparent 8%),
      radial-gradient(circle at 60% 25%, rgba(255,255,255,.4) 0, transparent 6%),
      radial-gradient(circle at 70% 35%, rgba(255,255,255,.35) 0, transparent 7%),
      linear-gradient(180deg, #C76BA3 0%, #B45A92 60%, #8A4070 100%);
    background-size:cover;background-position:center;
    position:relative;display:flex;align-items:flex-end;justify-content:center;
    color:#fff;overflow:hidden;
  }
  .ticket-card .poster::before{
    /* Stage figures (small silhouettes) */
    content:"";position:absolute;
    left:55%;top:35%;width:18%;height:30%;
    background:
      radial-gradient(ellipse 30% 50% at 25% 50%, rgba(0,0,0,.55) 0%, transparent 70%),
      radial-gradient(ellipse 30% 50% at 75% 50%, rgba(0,0,0,.55) 0%, transparent 70%);
  }
  .ticket-card .poster .silhouette{
    position:absolute;left:0;right:0;bottom:0;height:60%;
    background:
      /* Raised hand silhouettes (left to right) */
      radial-gradient(ellipse 1.2% 12% at 5% 92%, #000 0 80%, transparent 82%),
      radial-gradient(ellipse 1.4% 18% at 10% 95%, #000 0 75%, transparent 78%),
      radial-gradient(ellipse 1.5% 22% at 15% 90%, #000 0 78%, transparent 80%),
      radial-gradient(ellipse 1.3% 16% at 19% 95%, #000 0 78%, transparent 80%),
      radial-gradient(ellipse 1.6% 24% at 24% 90%, #000 0 78%, transparent 80%),
      radial-gradient(ellipse 1.3% 14% at 28% 95%, #000 0 78%, transparent 80%),
      radial-gradient(ellipse 1.5% 20% at 33% 92%, #000 0 78%, transparent 80%),
      radial-gradient(ellipse 1.4% 18% at 38% 95%, #000 0 78%, transparent 80%),
      radial-gradient(ellipse 1.3% 15% at 43% 95%, #000 0 78%, transparent 80%),
      radial-gradient(ellipse 1.6% 26% at 48% 88%, #000 0 78%, transparent 80%),
      radial-gradient(ellipse 1.4% 18% at 53% 94%, #000 0 78%, transparent 80%),
      radial-gradient(ellipse 1.5% 22% at 58% 90%, #000 0 78%, transparent 80%),
      radial-gradient(ellipse 1.3% 16% at 62% 95%, #000 0 78%, transparent 80%),
      radial-gradient(ellipse 1.4% 20% at 67% 92%, #000 0 78%, transparent 80%),
      radial-gradient(ellipse 1.6% 24% at 72% 89%, #000 0 78%, transparent 80%),
      radial-gradient(ellipse 1.3% 14% at 77% 95%, #000 0 78%, transparent 80%),
      radial-gradient(ellipse 1.5% 20% at 82% 92%, #000 0 78%, transparent 80%),
      radial-gradient(ellipse 1.4% 18% at 87% 94%, #000 0 78%, transparent 80%),
      radial-gradient(ellipse 1.5% 22% at 92% 91%, #000 0 78%, transparent 80%),
      radial-gradient(ellipse 1.3% 14% at 96% 95%, #000 0 78%, transparent 80%),
      /* Bottom crowd silhouette mass */
      linear-gradient(180deg, transparent 60%, rgba(0,0,0,.55) 85%, rgba(0,0,0,.85) 100%);
  }
  .ticket-card .info{padding:14px 16px;}
  .ticket-card .year{font-size:13px;color:var(--sub);}
  .ticket-card .date{
    font-size:22px;font-weight:700;color:var(--pink-deep);margin:3px 0 8px;
  }
  .ticket-card .date .day{font-size:15px;}
  .ticket-card .date .time{color:#222;margin-left:8px;font-size:15px;}
  .ticket-card .title{font-size:15px;font-weight:600;line-height:1.45;}
  .ticket-card .venue{font-size:13px;color:var(--sub);margin-top:5px;}
  .ticket-card .cta{
    background:var(--pink);color:#fff;text-align:center;
    padding:13px;font-size:14px;font-weight:700;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .ticket-card .cta::after{content:"›";font-size:20px;}

  /* カード下の3アイコン行 */
  .action-icons{
    display:flex;justify-content:space-around;
    background:#fff;border-radius:8px;
    box-shadow:0 1px 3px rgba(0,0,0,.08);
    padding:14px 4px 12px;margin-bottom:14px;
  }
  .action-icons .item{
    flex:1;display:flex;flex-direction:column;align-items:center;
    gap:6px;font-size:11px;color:var(--text);text-align:center;
    cursor:pointer;line-height:1.35;
  }
  .action-icons .item .ic{
    width:40px;height:40px;border:1.6px solid var(--pink);
    border-radius:50%;color:var(--pink);
    display:flex;align-items:center;justify-content:center;
    font-size:18px;background:#fff;
  }

  /* ===== 詳細画面 ===== */
  .detail-header{
    background:#fff;padding:12px 14px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:5;
  }
  .detail-header .back{
    background:none;border:none;color:#0099E3;
    padding:4px 10px;cursor:pointer;line-height:1;
    display:flex;align-items:center;
  }
  .detail-header .back svg{width:14px;height:24px;display:block;}
  .btn-pink-pill{
    background:var(--pink-deep);color:#fff;border:none;
    padding:6px 10px 6px 16px;font-size:14px;font-weight:700;
    cursor:pointer;position:relative;
    border-radius:16px 0 0 16px;
    box-shadow:0 1px 2px rgba(229,71,142,.3);
    margin-right:20px;letter-spacing:.02em;
  }
  .btn-pink-pill::after{
    /* 右側に右向き三角矢印(タグ形状) */
    content:"";position:absolute;
    right:-20px;top:0;bottom:0;
    width:20px;
    background:var(--pink-deep);
    clip-path:polygon(0 0, 100% 50%, 0 100%);
  }
  .btn-pink-pill:active{background:var(--pink-dark);}
  .detail-body{flex:1;padding:18px 14px 90px;overflow-y:auto;background:#fff;}
  .detail-date{
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 16px 12px;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
    position:relative;
    margin-bottom:14px;
  }
  .detail-date .kebab{
    position:absolute;top:12px;right:12px;
    width:24px;height:24px;border-radius:50%;
    background:#F3F3F5;border:none;color:#34C759;
    font-size:14px;font-weight:900;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    line-height:1;padding:0 0 4px;
  }
  .detail-date .year{font-size:12px;color:var(--sub);margin-bottom:2px;}
  .detail-date .big{
    display:flex;align-items:flex-start;gap:10px;
  }
  .detail-date .big .mdwrap{
    display:flex;align-items:baseline;line-height:1;
  }
  .detail-date .big .md{
    font-size:36px;color:#222;font-weight:700;letter-spacing:-.01em;
  }
  .detail-date .big .dw{
    font-size:14px;color:var(--pink-deep);font-weight:700;margin-left:2px;
  }
  .detail-date .big .times{
    text-align:left;font-size:13px;color:#222;font-weight:500;
    line-height:1.55;padding-top:10px;
  }
  .detail-date .ev-title{
    margin-top:4px;font-size:14.5px;font-weight:500;line-height:1.5;color:#222;
  }
  .detail-date .venue{font-size:12px;color:var(--sub);margin-top:3px;}

  .detail-ticket{
    position:relative;margin-bottom:16px;
    border-radius:10px;overflow:hidden;
    background:var(--pink-bg);
  }
  .detail-ticket .buyer{
    background:var(--pink-deep);color:#fff;
    display:flex;justify-content:space-between;align-items:center;
    font-weight:700;font-size:16px;
    padding:11px 18px;
    letter-spacing:.02em;
  }
  .detail-ticket .buyer .idx{
    font-size:12px;color:#fff;font-weight:500;opacity:.95;
  }
  .detail-ticket .row{
    display:flex;gap:14px;align-items:center;padding:14px 18px 4px;
  }
  .ticket-icon{
    width:78px;height:90px;flex-shrink:0;
    background-image:var(--icon-ticket-unused);
    background-repeat:no-repeat;background-position:center;background-size:contain;
  }
  .ticket-icon.used{filter:grayscale(.7) opacity(.55);}
  .ticket-icon .stub, .ticket-icon .lb{display:none;}
  .detail-ticket .seat{flex:1;line-height:1.5;}
  .detail-ticket .seat .type{color:var(--pink-deep);font-weight:700;font-size:14px;margin-bottom:3px;}
  .detail-ticket .seat .blk{font-size:14px;font-weight:500;color:#222;}
  .detail-ticket .seat .num{font-size:14px;font-weight:700;color:#222;}
  .detail-ticket .seat .price{font-size:13px;font-weight:500;color:#222;margin-top:2px;}
  .detail-ticket .dist{
    margin:10px 18px 2px;padding:7px 16px;
    border:1.5px solid #0099E3;color:#0099E3;
    border-radius:20px;background:#fff;
    font-size:14px;font-weight:700;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:10px;
    letter-spacing:.02em;
    text-align:left;
  }
  .detail-ticket .dist svg{width:26px;height:22px;flex-shrink:0;}
  .detail-ticket .desc{
    font-size:11px;color:#333;line-height:1.7;
    background:var(--pink-bg);padding:14px 18px 12px;
    margin-top:8px;
  }
  .detail-ticket .meta{
    font-size:11px;color:#444;line-height:1.7;
    padding:0 18px;background:var(--pink-bg);
  }
  .detail-ticket .meta .head{font-weight:700;color:#222;margin-bottom:2px;font-size:13px;margin-top:8px;}
  .detail-ticket .backlink{
    display:inline-flex;align-items:center;gap:4px;
    padding:8px 18px 6px;color:#0099E3;font-size:14px;font-weight:600;cursor:pointer;
    background:var(--pink-bg);
  }
  .detail-ticket .backlink::after{content:"›";font-size:18px;line-height:1;margin-left:2px;font-weight:900;}
  .detail-ticket .refno{
    background:var(--pink-bg);
    color:#0099E3;font-size:13px;font-weight:600;
    padding:8px 18px 14px;position:relative;
  }
  .detail-ticket .collapse{
    position:absolute;right:14px;bottom:8px;
    width:40px;height:40px;
    background-image:var(--icon-arrow-up);
    background-repeat:no-repeat;background-position:center;background-size:contain;
    color:transparent;font-size:0;cursor:pointer;border:none;
    filter:drop-shadow(0 2px 3px rgba(0,153,227,.35));
  }

  /* ===== 入場（選択シート） ===== */
  .sheet-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.4);
    display:none;align-items:flex-end;justify-content:center;
    z-index:100;
  }
  .sheet-overlay.show{display:flex;}
  .sheet{
    width:100%;max-width:430px;height:100%;background:#fff;
    display:flex;flex-direction:column;
    animation:slideUp .3s ease;
  }
  @keyframes slideUp{
    from{transform:translateY(100%);}
    to{transform:translateY(0);}
  }
  .sheet-header{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 18px;border-bottom:1px solid var(--line);background:#fff;
  }
  .sheet-header{transition:opacity .2s, max-height .2s;}
  .sheet-header.hidden-during-gate{
    opacity:0;max-height:0;padding:0;border:0;overflow:hidden;
  }
  .sheet-header .cnt{
    font-size:16px;color:#666;font-weight:500;
  }
  .sheet-header .cnt b{color:var(--pink-deep);font-weight:700;}
  .sheet-header .x{
    background:none;border:none;font-size:26px;color:var(--sub);cursor:pointer;
    padding:0 6px;line-height:1;
  }
  .ts-banner{
    background:var(--teal);color:#fff;text-align:center;
    padding:12px;font-size:16px;font-weight:600;
    font-family:"SF Mono","Consolas","Menlo",monospace;
    letter-spacing:.04em;
  }
  .sheet-body{flex:1;overflow-y:auto;background:var(--bg);padding:0;}
  .ev-card{
    background:#fff;margin:12px 14px 0;border-radius:6px;
    padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.05);
  }
  .ev-card .head{
    display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  }
  .ev-card .md-big{
    font-size:36px;font-weight:700;line-height:1.1;color:#222;
  }
  .ev-card .md-big .dw{font-size:16px;font-weight:700;}
  .ev-card .times{font-size:14px;text-align:right;padding-top:8px;}
  .ev-card .times div{margin:2px 0;}
  .ev-card .stars{
    display:flex;justify-content:space-around;align-items:center;
    margin:12px 0 8px;padding:0 32px;
  }
  .ev-card .star{
    display:inline-block;
    width:44px;height:44px;flex-shrink:0;
    background-image:var(--icon-gate-star);
    background-repeat:no-repeat;background-position:center;background-size:contain;
    color:transparent;font-size:0;
    user-select:none;-webkit-user-select:none;touch-action:none;
    transition:transform .15s, filter .15s;
  }
  .ev-card.ready .star{
    cursor:pointer;
    animation:starPulse 1.4s ease-in-out infinite;
  }
  .ev-card .star.pressed{
    transform:scale(.85);
    filter:brightness(.8) drop-shadow(0 0 4px rgba(126,211,33,.45));
  }
  @keyframes starPulse{
    0%,100%{transform:scale(1);box-shadow:0 1px 3px rgba(0,0,0,.15),0 0 0 0 rgba(126,211,33,.5);}
    50%{transform:scale(1.06);box-shadow:0 1px 3px rgba(0,0,0,.15),0 0 0 8px rgba(126,211,33,0);}
  }
  .ev-card .venue{font-size:13px;color:#333;margin-top:6px;}
  .ev-card .ev-title{font-size:13px;color:#333;margin-top:2px;line-height:1.45;}

  .sel-card{
    background:#fff;margin:12px 14px 0;border-radius:6px;
    padding:0;cursor:pointer;
    transition:background .15s, color .15s;
    box-shadow:0 1px 2px rgba(0,0,0,.05);
    overflow:hidden;
  }
  .sel-card.selected{
    background:var(--pink-deep);color:#fff;
  }
  .sel-card .buyer{
    font-weight:700;font-size:15px;color:#222;
    padding:12px 16px 10px;
    border-bottom:1px dashed var(--pink-soft);
  }
  .sel-card.selected .buyer{
    color:#fff;
    background:transparent;
    border-bottom:1px dashed rgba(255,255,255,.6);
  }
  .sel-card .body{
    display:flex;align-items:center;gap:20px;
    padding:16px 18px;
  }
  .sel-card .check{
    width:60px;height:60px;flex-shrink:0;
    background-image:var(--icon-ticket-unselected);
    background-repeat:no-repeat;background-position:center;background-size:contain;
    color:transparent;font-size:0;
    transition:filter .15s;
  }
  .sel-card.selected .check{
    background-image:var(--icon-ticket-selected);
    filter:drop-shadow(0 0 0 #fff) brightness(1.6) saturate(0);
  }
  /* selected版: 白い丸+ピンクチェックに見せるため背景に白円を重ねる */
  .sel-card.selected .check{
    background-color:#fff;border-radius:50%;
    background-image:var(--icon-ticket-selected);
    background-size:90%;background-position:center;background-repeat:no-repeat;
    filter:none;
  }
  .sel-card .seat .type{color:var(--pink-deep);font-weight:700;font-size:15px;line-height:1.45;}
  .sel-card.selected .seat .type{color:#fff;}
  .sel-card .seat .blk{font-size:14px;font-weight:600;color:#222;line-height:1.45;}
  .sel-card.selected .seat .blk{color:#fff;}
  .sel-card .seat .num{font-size:15px;font-weight:700;color:var(--pink-deep);line-height:1.45;}
  .sel-card.selected .seat .num{color:#fff;}

  /* ===== GATE スライド ===== */
  .warn-banner{
    background:var(--yellow-warn);color:var(--red);text-align:center;
    padding:14px;font-size:15px;font-weight:700;line-height:1.5;
  }
  .gate-area{
    background:var(--gate-green);
    margin:12px 14px 0;border-radius:6px;
    height:145px;position:relative;overflow:hidden;
    cursor:grab;touch-action:none;user-select:none;
    transition:background .2s;
  }
  .gate-area::after{
    /* 右側固定の teal セクション (常時表示) */
    content:"";position:absolute;top:0;right:0;bottom:0;width:12%;
    background:var(--teal);z-index:1;
  }
  .gate-bar{
    position:absolute;top:0;left:0;bottom:0;width:88%;
    background:var(--navy);
    display:flex;align-items:center;justify-content:center;
    z-index:2;
    transition:transform .2s ease;
    will-change:transform;
  }
  .gate-area:active{cursor:grabbing;}
  .gate-area.morphing{
    transition:all .3s ease;
    height:150px;background:var(--pink-deep);
  }
  .gate-area.morphing::after{background:var(--pink-deep);}
  .gate-area.morphing .gate-bar{
    transform:translateX(0) !important;
    background:var(--pink-deep);
  }
  .gate-content{
    color:transparent;font-size:0;
    width:130px;height:48px;
    background-image:var(--icon-gate);
    background-repeat:no-repeat;background-position:center;background-size:contain;
    position:relative;z-index:2;line-height:1;
  }
  .gate-arrows-l, .gate-arrows-r{
    position:absolute;display:flex;gap:2px;
    z-index:3;line-height:1;
    transition:opacity .2s;
    animation:arrowPulse 1s ease-in-out infinite alternate;
  }
  .gate-arrows-l svg, .gate-arrows-r svg{
    width:18px;height:24px;display:block;
    fill:var(--yellow);
    filter:drop-shadow(0 0 1px rgba(0,0,0,.2));
  }
  .gate-arrows-l{left:20px;top:50%;transform:translateY(-50%);}
  .gate-arrows-r{right:22px;top:50%;transform:translateY(-50%);}
  .gate-area.touching .gate-arrows-l,
  .gate-area.touching .gate-arrows-r{opacity:0;animation:none;}
  @keyframes arrowPulse{
    0%{opacity:.55;}
    100%{opacity:1;}
  }
  .gate-success-text{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:24px;font-weight:700;z-index:4;
    opacity:0;transition:opacity .25s;
    letter-spacing:.04em;
    pointer-events:none;
  }
  .gate-area.morphing .gate-content,
  .gate-area.morphing .gate-arrows-l,
  .gate-area.morphing .gate-arrows-r{opacity:0;}
  .gate-area.morphing .gate-success-text{opacity:1;}

  /* ===== 使用済 ===== */
  .used-banner-pink{
    background:var(--pink-deep);color:#fff;text-align:center;
    padding:34px 14px;font-size:22px;font-weight:700;
    margin:12px 14px 0;border-radius:6px;
    animation:fadeIn .4s ease;
    letter-spacing:.02em;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(-10px);}to{opacity:1;}}
  .used-card{
    background:#F5F5F5;margin:12px 14px 0;border-radius:6px;
    position:relative;overflow:hidden;
  }
  .used-card .buyer{
    background:var(--pink-deep);color:#fff;font-weight:700;font-size:15px;
    padding:10px 16px;
  }
  .used-card .body{
    display:flex;align-items:center;gap:18px;
    padding:16px 18px;position:relative;
  }
  .used-card .icon{
    width:62px;height:52px;background:#fff;border:1px solid #BBB;border-radius:4px;
    color:#555;display:flex;align-items:center;justify-content:center;
    font-size:28px;position:relative;flex-shrink:0;
  }
  .used-card .icon::before{
    content:"💺";font-size:30px;filter:grayscale(1) brightness(.7);
  }
  .used-card .icon .badge{
    position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
    background:#fff;border:1px solid #999;color:#666;
    font-size:10px;padding:1px 6px;border-radius:2px;white-space:nowrap;
    font-weight:600;
  }
  .used-card .seat{flex:1;}
  .used-card .seat .type{font-size:15px;color:#666;font-weight:700;}
  .used-card .seat .blk{font-size:14px;color:#666;}
  .used-card .seat .num{font-size:15px;font-weight:700;color:#666;}
  .used-card .stamp{
    position:absolute;top:50%;right:16px;transform:translateY(-50%) rotate(-8deg);
    border:3px solid var(--red);color:var(--red);
    padding:6px 16px 4px;border-radius:3px;
    font-size:22px;font-weight:900;letter-spacing:.15em;
    font-family:"YuMincho","Yu Mincho","ヒラギノ明朝 ProN","Hiragino Mincho ProN",serif;
    background:rgba(255,255,255,.9);
    line-height:1;
  }
  .used-card .when{
    font-size:12px;color:#666;
    padding:0 18px 14px;
  }

  /* ===== 設定モーダル ===== */
  .cfg-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.6);
    display:none;align-items:center;justify-content:center;
    z-index:200;padding:14px;
  }
  .cfg-overlay.show{display:flex;}
  .cfg{
    background:#fff;border-radius:8px;width:100%;max-width:380px;
    max-height:88vh;overflow-y:auto;
  }
  .cfg h3{
    margin:0;padding:14px;background:var(--pink);color:#fff;
    border-radius:8px 8px 0 0;font-size:15px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .cfg h3 .x{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;}
  .cfg-body{padding:14px;}
  .cfg-section{
    border:1px solid var(--line);border-radius:6px;padding:10px;margin-bottom:10px;
  }
  .cfg-section h4{
    margin:0 0 8px;font-size:12px;color:var(--pink-dark);
    border-left:3px solid var(--pink);padding-left:6px;
  }
  .cfg label{display:block;font-size:11px;color:var(--sub);margin-bottom:3px;}
  .cfg input{
    width:100%;padding:8px;border:1px solid var(--line);border-radius:4px;
    font-size:13px;font-family:inherit;margin-bottom:8px;
  }
  .cfg input:focus{outline:none;border-color:var(--pink);}
  .cfg .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .cfg .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .cfg .btn-row{display:flex;gap:8px;padding:10px 14px 14px;}
  .cfg .btn{
    flex:1;padding:12px;border:none;border-radius:4px;
    font-size:14px;font-weight:700;cursor:pointer;
  }
  .cfg .btn.primary{background:var(--pink);color:#fff;}
  .cfg .btn.ghost{background:#fff;color:var(--sub);border:1px solid var(--line);}
  .seat-list{margin-top:8px;}
  .seat-list .seat-row{
    display:flex;gap:6px;align-items:center;margin-bottom:6px;
  }
  .seat-list .seat-row input{margin:0;}
  .seat-list .seat-row .del{
    background:#fff;border:1px solid var(--line);color:var(--sub);
    width:28px;height:32px;border-radius:4px;cursor:pointer;flex-shrink:0;
  }
  .seat-list .add{
    background:#fff;border:1px dashed var(--pink);color:var(--pink);
    padding:8px;border-radius:4px;width:100%;font-size:12px;cursor:pointer;
    font-weight:600;
  }

  /* ===== ボトムタブ ===== */
  .tabbar{
    position:fixed;bottom:0;left:0;right:0;
    max-width:430px;margin:0 auto;
    background:#fff;display:flex;border-top:1px solid var(--line);
    z-index:6;
  }
  .tabbar button{
    flex:1;padding:10px 4px 8px;background:none;border:none;
    font-size:11px;color:var(--sub);cursor:pointer;
    position:relative;
  }
  .tabbar button .ic{display:block;font-size:22px;margin-bottom:3px;}
  .tabbar button.active{color:var(--pink);}
  .tabbar .badge{
    position:absolute;top:6px;right:22%;
    background:var(--pink);color:#fff;border-radius:10px;
    font-size:10px;padding:1px 6px;
  }

  .hidden{display:none !important;}

  /* MOC マーカー（一覧画面 左下・透過水印） */
  .moc-marker{
    position:fixed;
    bottom:68px;
    left:8px;
    z-index:7;
    color:rgba(0,0,0,.42);
    font-size:11px;
    font-weight:700;
    letter-spacing:.2em;
    padding:4px 10px;
    border:1px solid rgba(0,0,0,.25);
    border-radius:3px;
    pointer-events:none;
    font-family:"SF Mono","Consolas","Menlo",monospace;
    background:rgba(255,255,255,.5);
    backdrop-filter:blur(2px);
  }

  /* GATE中の波紋 */
  .gate-result-overlay{
    position:fixed;inset:0;background:rgba(26,63,168,.92);
    display:none;align-items:center;justify-content:center;

<script>
const KEY = "eplus_mock_v2";
const $ = id => document.getElementById(id);

const defaultData = {
  title:"TVアニメ『逃げ上手の若君』鶴岡八幡宮プレミア上映会",

  orderno:"1140054981920",
  type:"全席指定",
  description:`TVアニメ『逃げ上手の若君』鶴岡八幡宮プレミア上映会
登壇者:結川あさき(北条時行役)/矢野妃菜喜(雫役)/中村悠一(諏訪頼重役)
お問合せ:ホットスタッフ・プロモーション 050-5211-6077(平日12:00〜18:00)
※登壇者は、予告なく変更となる場合がございます。※開場・開演時間は変更になる可能性がございます。※雨天決行(天候により一時中断もしくは中止になる場合もございます。)、荒天中止(中止の場合は公式サイト及び公式Xにてお知らせします。)※雨天の際、傘の利用は他のお客様の視界を妨げる要因となりますので、レインコート等の雨具をご用意ください。※ご来場時にご購入者様の本人様確認をさせていただく場合がございますので、有効な身分証をご持参のうえお越しください。※その他本イベントの注意事項等はアニメ公式サイトにてご確認ください。`,

イープラス 050-3185-6483`,

    {block:"A", row:"9", num:"7", used:false, usedAt:null, refno:"DSO-3185-6483-1"},
    {block:"A", row:"9", num:"6", used:false, usedAt:null, refno:"DSO-3185-6483-2"}

};

function load(){
  try{ return JSON.parse(localStorage.getItem(KEY)) || JSON.parse(JSON.stringify(defaultData)); }
  catch(e){ return JSON.parse(JSON.stringify(defaultData)); }
}
function save(d){ localStorage.setItem(KEY, JSON.stringify(d)); }
let state = load();
// ページロード時は使用状態をクリーンにリセット（公演情報は維持）
state.seats.forEach(s=>{ s.used = false; s.usedAt = null; });
save(state);

// ===== 日付フォーマット=====
function fmtDateJP(iso){
  if(!iso) return {y:"",md:"",day:""};
  const d = new Date(iso);
  const y = d.getFullYear();
  const m = d.getMonth()+1;
  const dd = d.getDate();
  const w = ["日","月","火","水","木","金","土"][d.getDay()];
  return {y:`${y}年`, md:`${m}/${dd}`, day:w};
}
function nowTsFull(){
  const d = new Date();
  const Y = d.getFullYear();
  const M = String(d.getMonth()+1).padStart(2,"0");
  const D = String(d.getDate()).padStart(2,"0");
  const w = ["日","月","火","水","木","金","土"][d.getDay()];
  const h = String(d.getHours()).padStart(2,"0");
  const m = String(d.getMinutes()).padStart(2,"0");
  const s = String(d.getSeconds()).padStart(2,"0");
  const ms = String(Math.floor(d.getMilliseconds()/10)).padStart(2,"0");
  return `${Y}/${M}/${D}(${w}) ${h}:${m}:${s}.${ms}`;
}
function nowUsed(){
  const d = new Date();
  const Y = d.getFullYear();
  const M = String(d.getMonth()+1).padStart(2,"0");
  const D = String(d.getDate()).padStart(2,"0");
  const w = ["日","月","火","水","木","金","土"][d.getDay()];
  const h = String(d.getHours()).padStart(2,"0");
  const m = String(d.getMinutes()).padStart(2,"0");
  return `${Y}/${M}/${D}(${w}) ${h}:${m}`;
}

// ===== 一覧画面描画 =====
function renderList(){

    <div class="ticket-card" id="theCard" ${allUsed?'style="opacity:.55;"':""}>
      <div class="ribbon">スマチケ</div>

        <div class="date">${f.md}<span class="day">(${f.day})</span><span class="time">${state.start} 開演</span></div>
        <div class="title">${escapeHtml(state.title)}</div>
        <div class="venue">${escapeHtml(state.venue)}</div>
      </div>
      <div class="cta">${allUsed?"使用済みチケット":"チケットはこちら"}</div>
    </div>
    <div class="action-icons">

function escapeHtml(s){
  return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
}

// ===== 詳細画面描画 =====
function renderDetail(){
  const f = fmtDateJP(state.date);
  const body = $("detailBody");
  const distIcon = `<svg viewBox="0 0 36 32" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

  </svg>`;

      <div class="dist">${distIcon}同行者へ分配する</div>
      <div class="desc">${escapeHtml(state.description||"").replace(/\n/g,"<br>")}</div>
      <div class="meta">${escapeHtml(state.shopInfo||"").replace(/\n/g,"<br>")}</div>
      <div class="backlink">チケット裏面情報</div>
      <div class="refno">
        チケット番号: ${escapeHtml(s.refno)}
        <button class="collapse" title="折りたたむ">∧</button>
      </div>
    </div>
  `).join("");
  body.innerHTML = `
    <div class="detail-date">
      <button class="kebab">⋯</button>
      <div class="year">${f.y}</div>
      <div class="big">
        <span class="mdwrap"><span class="md">${f.md}</span><span class="dw">(${f.day})</span></span>
        <span class="times">${state.open} 開場<br>${state.start} 開演</span>
      </div>
      <div class="ev-title">${escapeHtml(state.title)}</div>
      <div class="venue">${escapeHtml(state.venue)}</div>
    </div>
    ${ticketsHtml}
  `;
}

// ===== 画面遷移 =====
function openDetail(){
  renderDetail();
  $("screenList").classList.add("hidden");
  $("screenDetail").classList.remove("hidden");
}
function backToList(){
  $("screenDetail").classList.add("hidden");
  $("screenList").classList.remove("hidden");
  renderList();
}
$("btnBack").onclick = backToList;

// ===== 選択シート=====
let selection = []; // index配列
let sheetPhase = "select"; // select / gate / gateActive / done
let gateInteractive = false;
let doneShowBanner = true; // done時に「○枚使用しました」バナーを表示中か
function openSheet(){
  selection = [];
  sheetPhase = "select";
  doneShowBanner = true;
  renderSheet();
  $("sheet").classList.add("show");
}
function closeSheet(){
  $("sheet").classList.remove("show");
  renderList();
}
$("btnGoEntry").onclick = openSheet;
$("btnCloseSheet").onclick = closeSheet;

function unusedIndices(){
  return state.seats.map((s,i)=>s.used?null:i).filter(v=>v!==null);
}

function renderSheet(){
  const f = fmtDateJP(state.date);
  const unused = unusedIndices();
  // done時はselection分が既にusedになっているため、totalにselectionを足し戻す
  const total = (sheetPhase === "done") ? unused.length + selection.length : unused.length;

  if(sheetPhase === "select" || sheetPhase === "gate"){
    $("selCount").innerHTML = `<b>${selection.length}/${total}枚</b> 選択中`;
  } else if(sheetPhase === "gateActive"){
    $("selCount").innerHTML = `<b>${selection.length}/${total}枚</b> 選択中`;
  } else { // done
    $("selCount").innerHTML = `<b>0/${total}枚</b> 選択中`;
  }

  // gateActive時はsheet-headerを隠す
  const sh = document.querySelector("#sheet .sheet-header");
  if(sh){
    if(sheetPhase === "gateActive") sh.classList.add("hidden-during-gate");
    else sh.classList.remove("hidden-during-gate");
  }

  const evReady = (sheetPhase === "gate");
  const evCardHtml = `
    <div class="ev-card ${evReady?"ready":""}" id="evCard">
      <div class="head">
        <div class="md-big">${f.md}<span class="dw">(${f.day})</span></div>
        <div class="times">
          <div>${state.open} 開場</div>
          <div>${state.start} 開演</div>
        </div>
      </div>
      <div class="stars">
        <span class="star" data-star="L">★</span>
        <span class="star" data-star="R">★</span>
      </div>
      <div class="venue">${escapeHtml(state.venue)}</div>
      <div class="ev-title">${escapeHtml(state.title)}</div>
    </div>
  `;

  let mainHtml = "";

  if(sheetPhase === "select" || sheetPhase === "gate" || sheetPhase === "gateActive"){
    // 警告バナー（gateActive時のみ表示）
    if(sheetPhase === "gateActive"){
      mainHtml += `<div class="warn-banner">スライドすると使用済になります。<br>使用済チケットは、入場・再発行不可</div>`;
    }
    mainHtml += `<div class="ts-banner" id="tsBanner2">${nowTsFull()}</div>`;

    if(sheetPhase === "gateActive"){
      // 全選択後の2点同時タップで起動: GATEバーをイベントカードの場所に
      const arrowL = `<svg viewBox="0 0 14 22"><polygon points="14,0 0,11 14,22"/></svg>`;
      const arrowR = `<svg viewBox="0 0 14 22"><polygon points="0,0 14,11 0,22"/></svg>`;
      mainHtml += `
        <div class="gate-area" id="gateArea">
          <div class="gate-bar" id="gateBar">
            <div class="gate-arrows-l">${arrowL}${arrowL}</div>
            <div class="gate-content">GATE</div>
            <div class="gate-arrows-r">${arrowR}${arrowR}</div>
          </div>
          <div class="gate-success-text" id="gateSuccessText"></div>
        </div>
      `;
    } else {
      mainHtml += evCardHtml;
    }

    // チケットカード
    state.seats.forEach((s,i)=>{
      if(s.used) return;
      const isSel = selection.includes(i);
      mainHtml += `
        <div class="sel-card ${isSel?"selected":""}" data-i="${i}">
          <div class="buyer">${escapeHtml(state.buyer)} 様</div>
          <div class="body">
            <div class="check">✓</div>
            <div class="seat">
              <div class="type">${escapeHtml(state.type)}</div>
              <div class="blk">${escapeHtml(s.block)}ブロック</div>
              <div class="num">${escapeHtml(s.row)}列${escapeHtml(s.num)}番</div>
            </div>
          </div>
        </div>
      `;
    });
  } else if(sheetPhase === "done"){
    // 使用済表示
    $("sheet").querySelector(".ts-banner").remove?.();
    mainHtml += `<div class="ts-banner">${nowTsFull()}</div>`;
    // 初期はピンクバナー、4秒後にイベントカードに入れ替わる
    if(doneShowBanner){
      mainHtml += `<div class="used-banner-pink">${selection.length}枚使用しました</div>`;
    } else {
      mainHtml += evCardHtml;
    }
    selection.forEach(i=>{
      const s = state.seats[i];
      mainHtml += `
        <div class="used-card">
          <div class="buyer">${escapeHtml(state.buyer)} 様</div>
          <div class="body">
            <div class="icon"><span class="badge">入場済</span></div>
            <div class="seat">
              <div class="type">${escapeHtml(state.type)}</div>
              <div class="blk">${escapeHtml(s.block)}ブロック</div>
              <div class="num">${escapeHtml(s.row)}列${escapeHtml(s.num)}番</div>
            </div>
            <div class="stamp">使用済</div>
          </div>
          <div class="when">使用日時: ${escapeHtml(s.usedAt || "")}</div>
        </div>
      `;
    });
    // 残りの未使用も表示
    state.seats.forEach((s,i)=>{
      if(s.used && !selection.includes(i)){
        // 既に使用済(過去)
      }
    });
  }

  $("sheetBody").innerHTML = mainHtml;

  // 静的バナーは隠す
  $("tsBanner").style.display = "none";

  // カードクリックイベント（select/gate共通: タップで選択/解除）
  if(sheetPhase === "select" || sheetPhase === "gate"){
    $("sheetBody").querySelectorAll(".sel-card").forEach(el=>{
      el.onclick = ()=>{
        const i = parseInt(el.dataset.i);
        if(selection.includes(i)){
          selection = selection.filter(v=>v!==i);
        }else{
          selection.push(i);
        }
        // 1枚以上選択でgateに遷移
        if(selection.length > 0){
          sheetPhase = "gate";
        } else {
          sheetPhase = "select";
        }
        renderSheet();
      };
    });
  }

  // 2点同時タップ判定（gate phase: 緑星）
  if(sheetPhase === "gate"){
    initStarMultiTouch();
  }

  // GATEバーのスワイプ
  if(sheetPhase === "gateActive"){
    initGateSlide();
  }
}

// 時刻バナー更新（シート表示中のみ）
setInterval(()=>{
  const b = document.querySelector("#sheetBody .ts-banner");
  if(b) b.textContent = nowTsFull();
}, 50);

// ===== 2点同時タップ判定(緑星2つを同時にタップでGATE発動) =====
function initStarMultiTouch(){
  const card = $("evCard");
  if(!card) return;
  const stars = card.querySelectorAll(".star");
  const pressed = new Set();
  let mouseFallbackTimer = null;

  const press = (which, el)=>{
    pressed.add(which);
    el.classList.add("pressed");
    if(pressed.size >= 2){
      // 両方タップ → GATE発動
      stars.forEach(s=>s.classList.remove("pressed"));
      pressed.clear();
      activateGate();
    }
  };
  const release = (which, el)=>{
    pressed.delete(which);
    el.classList.remove("pressed");
  };

  stars.forEach(el=>{
    const which = el.dataset.star;
    el.addEventListener("touchstart", e=>{e.preventDefault(); press(which,el);}, {passive:false});
    el.addEventListener("touchend",   e=>{release(which,el);});
    el.addEventListener("touchcancel",e=>{release(which,el);});
    // マウス用フォールバック: 1秒以内に両方クリックでOK
    el.addEventListener("mousedown", e=>{
      press(which,el);
      clearTimeout(mouseFallbackTimer);
      mouseFallbackTimer = setTimeout(()=>{
        stars.forEach(s=>s.classList.remove("pressed"));
        pressed.clear();
      }, 1500);
    });
    el.addEventListener("mouseup", e=>release(which,el));
    el.addEventListener("mouseleave", e=>release(which,el));
  });
}

function activateGate(){
  sheetPhase = "gateActive";
  renderSheet();
}

// ===== GATE スワイプ(左右どちらもOK・NAVYバーを動かす) =====
function initGateSlide(){
  const area = $("gateArea");
  const bar = $("gateBar");
  if(!area || !bar) return;
  let dragging=false, startX=0, w=0, maxRight=0, maxLeft=0;

  const getX = (e)=>{
    if(e.touches && e.touches.length) return e.touches[0].clientX;
    if(e.changedTouches && e.changedTouches.length) return e.changedTouches[0].clientX;
    return e.clientX;
  };

  const start = (e)=>{
    dragging = true;
    startX = getX(e);
    w = area.clientWidth;
    // 右にスライドできる最大: バーが完全に右の teal の上に来るまで (= 14% of area)
    maxRight = w * 0.86;
    // 左にスライドできる最大: バーが左に完全に隠れるまで (バー幅 = 86% of area)
    maxLeft = w * 0.86;
    bar.style.transition="";
    area.classList.add("touching");
  };
  const move = (e)=>{
    if(!dragging) return;
    if(e.cancelable) e.preventDefault();
    const x = getX(e);
    let dx = x - startX;
    if(dx > maxRight) dx = maxRight;
    if(dx < -maxLeft) dx = -maxLeft;
    bar.style.transform = `translateX(${dx}px)`;
    const ratio = Math.abs(dx) / (w * 0.78);
    if(ratio >= 1){
      // 完了
      dragging = false;
      bar.style.transition="transform .15s ease";
      bar.style.transform = `translateX(${dx>0?maxRight:-maxLeft}px)`;
      area.classList.remove("touching");
      triggerGate();
    }
  };
  const end = ()=>{
    if(!dragging) return;
    dragging = false;
    area.classList.remove("touching");
    bar.style.transition="transform .25s ease";
    bar.style.transform = "translateX(0)";
  };
  area.addEventListener("mousedown",start);
  area.addEventListener("touchstart",start,{passive:false});
  document.addEventListener("mousemove",move);
  document.addEventListener("touchmove",move,{passive:false});
  document.addEventListener("mouseup",end);
  document.addEventListener("touchend",end);
}

function triggerGate(){
  const area = $("gateArea");
  const successText = $("gateSuccessText");
  if(area && successText){
    successText.textContent = `${selection.length}枚使用しました`;
    // GATEバーをピンクバナーへモーフ
    setTimeout(()=>area.classList.add("morphing"), 250);
  }
  setTimeout(()=>{
    const ts = nowUsed();
    selection.forEach(i=>{
      state.seats[i].used = true;
      state.seats[i].usedAt = ts;
    });
    save(state);
    sheetPhase = "done";
    doneShowBanner = true;
    renderSheet();
    // 4秒後にピンクバナーをイベントカードに切り替え
    setTimeout(()=>{
      if(sheetPhase === "done"){
        doneShowBanner = false;
        renderSheet();
      }
    }, 4000);
  },1200);
}

// ===== 設定モーダル =====
function fillCfg(){
  $("cf-title").value = state.title;
  $("cf-venue").value = state.venue;
  $("cf-date").value = state.date;
  $("cf-open").value = state.open;
  $("cf-start").value = state.start;
  $("cf-price").value = state.price;
  $("cf-buyer").value = state.buyer;
  $("cf-orderno").value = state.orderno;
  $("cf-type").value = state.type;
  $("cf-count").value = state.seats.length;
  $("cf-description").value = state.description || "";
  $("cf-shopinfo").value = state.shopInfo || "";
  renderSeatInputs();
}

function syncSeatCount(n){
  n = Math.max(1, Math.min(10, parseInt(n)||1));
  if(state.seats.length === n) return;
  if(state.seats.length < n){
    // 追加
    while(state.seats.length < n){
      const next = state.seats.length + 1;
      state.seats.push({
        block:"A", row:"9", num:String(7 - state.seats.length).padStart(1,"0"),
        used:false, usedAt:null,
        refno:"DSO-XXXX-"+next
      });
    }
  } else {
    // 末尾から削除
    state.seats.length = n;
  }
}
function renderSeatInputs(){
  const slot = $("seatList");
  slot.innerHTML = state.seats.map((s,i)=>`
    <div class="seat-row" data-i="${i}">
      <input data-k="block" type="text" placeholder="ブロック" value="${escapeHtml(s.block)}" style="flex:1;">
      <input data-k="row" type="text" placeholder="列" value="${escapeHtml(s.row)}" style="flex:1;">
      <input data-k="num" type="text" placeholder="番" value="${escapeHtml(s.num)}" style="flex:1;">
      <button class="del" data-del="${i}" title="削除">✕</button>
    </div>
  `).join("");
  slot.querySelectorAll(".del").forEach(b=>{
    b.onclick = ()=>{
      const i = parseInt(b.dataset.del);
      if(state.seats.length <= 1) return; // 最低1枚は残す
      state.seats.splice(i,1);
      $("cf-count").value = state.seats.length;
      renderSeatInputs();
    };
  });
  slot.querySelectorAll("input").forEach(inp=>{
    inp.oninput = ()=>{
      const i = parseInt(inp.closest(".seat-row").dataset.i);
      state.seats[i][inp.dataset.k] = inp.value;
    };
  });
}
$("btnOpenCfg").onclick = ()=>{ fillCfg(); $("cfgOverlay").classList.add("show"); };
$("btnCloseCfg").onclick = ()=>$("cfgOverlay").classList.remove("show");
$("btnAddSeat").onclick = ()=>{
  state.seats.push({block:"A",row:"1",num:"1",used:false,usedAt:null,refno:"DSO-XXXX-"+state.seats.length});
  $("cf-count").value = state.seats.length;
  renderSeatInputs();
};
$("cf-count").oninput = (e)=>{
  syncSeatCount(e.target.value);
  renderSeatInputs();
};
$("btnSaveCfg").onclick = ()=>{
  state.title = $("cf-title").value || "(未設定)";
  state.venue = $("cf-venue").value || "(未設定)";
  state.date = $("cf-date").value;
  state.open = $("cf-open").value;
  state.start = $("cf-start").value;
  state.price = $("cf-price").value;
  state.buyer = $("cf-buyer").value || "-";
  state.orderno = $("cf-orderno").value || "-";
  state.type = $("cf-type").value || "-";
  state.description = $("cf-description").value || "";
  state.shopInfo = $("cf-shopinfo").value || "";
  syncSeatCount($("cf-count").value);
  save(state);
  $("cfgOverlay").classList.remove("show");
  renderList();
};
$("btnResetUsed").onclick = ()=>{
  if(!confirm("全座席の使用状態をリセットしますか？")) return;
  state.seats.forEach(s=>{ s.used=false; s.usedAt=null; });
  save(state);
  renderSeatInputs();
  alert("リセットしました。");
};

// ===== 初期化 =====
renderList();

// ===== デバッグ: URLハッシュで画面状態を強制 =====
(function debugStateFromHash(){
  const h = location.hash.replace("#","");
  if(!h) return;
  if(h === "cfg"){ fillCfg(); $("cfgOverlay").classList.add("show"); }
  else if(h === "detail"){ openDetail(); }
  else if(h === "select"){ openDetail(); openSheet(); }
  else if(h === "gate"){
    openDetail(); openSheet();
    selection = state.seats.map((s,i)=>i);
    sheetPhase = "gate"; renderSheet();
  }
  else if(h === "gateActive"){
    openDetail(); openSheet();
    selection = state.seats.map((s,i)=>i);
    sheetPhase = "gateActive"; renderSheet();
  }
  else if(h === "done"){
    openDetail(); openSheet();
    selection = state.seats.map((s,i)=>i);
    const ts = nowUsed();
    selection.forEach(i=>{ state.seats[i].used=true; state.seats[i].usedAt=ts; });
    sheetPhase = "done"; doneShowBanner = true; renderSheet();
  }
  else if(h === "doneFinal"){
    openDetail(); openSheet();
    selection = state.seats.map((s,i)=>i);
    const ts = nowUsed();
    selection.forEach(i=>{ state.seats[i].used=true; state.seats[i].usedAt=ts; });
    sheetPhase = "done"; doneShowBanner = false; renderSheet();
  }
})();
</script>
