* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html { height: 100%; }
body {
  /* Real app uses NotoSansJP-Bold / NotoSansJP-Regular (extracted from Font assets in libil2cpp). */
  font-family: 'Noto Sans JP','Hiragino Sans','Yu Gothic Medium','YuGothic','Meiryo',-apple-system,sans-serif;
  background: #000;
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100dvh;
  overflow: visible;
}

/* ===== PHONE SHELL ===== */
.phone {
  width: 100%;
  height: 100dvh;
  background: #e6e6e6;
  position: relative;
  border-radius: 0;
  box-shadow: none;
  overflow: visible;
  display: flex;
  flex-direction: column;
}

/* ===== STATUS BAR ===== */


.status-icons { display: flex; gap: 5px; align-items: center; }
.status-icons svg { fill: white; }

/* ===== HEADER ===== */
.header {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 15;
  display: flex;
  justify-content: space-between;
  align-items: center;
  /* 実機ヘッダーはiOSステータスバー下に来る（実測ロゴ top≈60px, left≈8px）。
     env(safe-area-inset-top) が0になる環境(デスクトップ描画等)でもステータスバー相当の
     最小44pxを確保し、実機と同じ位置に。左は8pxに。 */
  padding: calc(max(env(safe-area-inset-top, 0px), 24px)) 16px 14px 8px;
  pointer-events: none;
}
.logo-area {
  display: flex;
  align-items: center;
  gap: 5px;
  pointer-events: none;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 5px;
  pointer-events: none;
}
/* Oロゴ: 画像のみ */
/* 実機アセット Texture2D/header_logo.png（O＋ーチケ＋LAWSON TICKET が1枚に入った白ロゴ, 元108×44）。
   実機ヘッダー実測で幅≈56px。白画像なので青ヒーロー上にそのまま重ねる（filter不要）。 */
.header-logo {
  width: 60px;
  height: auto;
  display: block;
  flex-shrink: 0;
}
/* Unity Header/Title Text: NotoSansJP-Regular size 32, color #DAECF8 (extracted from libil2cpp). */
.header-title {
  color: #DAECF8;
  font-size: 19px;
  font-weight: 400;
  font-family: 'Noto Sans JP','Hiragino Sans',sans-serif;
  margin-left: 8px;
}
.header-icons { display: flex; gap: 17px; pointer-events: auto; }
.header-icons svg { fill: white; width: 27px; height: 27px; }

/*
 * Hero copy-protect ripple — values extracted from libil2cpp.so via Il2CppDumper.
 *   Source: ScreenEntry.CopyProtectAnimation()  RVA 0x362A1C
 *   Library: LeanTween
 *
 *   Per wave (lifetime = 3.0s):
 *     localScale: (0.02, 0.02, 0)  → tween → Vector2.one  over 3.0s, EaseOutQuad
 *     color:      Color(1,1,1,1)   → alpha → 0.30         over 3.0s, Linear
 *     onComplete: DestroyImmediate(clone)
 *   Spawn cadence: 1.5s (moveLocalX 0→0 over 1.5s used as a timer that re-invokes the method)
 *   → at any moment 2 overlapping waves are visible.
 *
 *   LogoO sprite is 1265 × 1069 in a 720-wide canvas → at scale 1.0 it overflows the
 *   400-tall CopyProtect area (intentionally clipped).
 */
.ripple-container {
  /* must span the full hero so .ripple-ring's % width resolves correctly. */
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 2;
  pointer-events: none;
}
.ripple-ring {
  position: absolute;
  top: 50%; left: 50%;
  /* Android extraction: logo_O wave renders as an oversized clone clipped by the hero.
     iPhone screenshots read slightly narrower than the 720-wide Android canvas, so 170% keeps the same feel. */

  background: white;
  /* base state == animation start (Unity): scale 0.02, alpha 1.0 */

  opacity: 1;
  /* libil2cpp.so confirmed (disasm of ScreenEntry.CopyProtectAnimation, RVA 0x362A1C):
       LeanTween.scale → Vector2.one   over s3 = 3.0s,  setEaseOutQuad

  /* 実機比で約0.2s早かったため、広がり(lifetime)を 1.7s → 1.9s に調整。 */
  animation:
    rippleScale 1.9s linear infinite,
    rippleAlpha 1.9s linear infinite;
  animation-delay: -1.03s, -1.03s;

/* 2nd wave: 0.75s behind (= 倍速時の respawn cadence)。 */
.ripple-ring.r2 { animation-delay: -0.1s, -0.1s; }

/* EaseOutQuad sampled f(t)=2t-t², scale = 0.02 + 0.98*f(t). */
@keyframes rippleScale {
  0%   { transform: translate(-50%, -50%) scale(0.020); }
  10%  { transform: translate(-50%, -50%) scale(0.206); }
  20%  { transform: translate(-50%, -50%) scale(0.373); }
  30%  { transform: translate(-50%, -50%) scale(0.520); }
  40%  { transform: translate(-50%, -50%) scale(0.647); }
  50%  { transform: translate(-50%, -50%) scale(0.755); }
  60%  { transform: translate(-50%, -50%) scale(0.843); }
  70%  { transform: translate(-50%, -50%) scale(0.912); }
  80%  { transform: translate(-50%, -50%) scale(0.961); }
  90%  { transform: translate(-50%, -50%) scale(0.990); }
  100% { transform: translate(-50%, -50%) scale(1.000); }
}
@keyframes rippleAlpha {
  /* ScreenEntry.CopyProtectAnimation() (disasm confirmed): image Color alpha starts 0.10
     (libil2cpp .rodata *0x88B380) and LeanTween.alpha → 0.30 (*0x88B368) over 3.0s Linear.
     → wave is translucent throughout, never opaque (matches 実機: even the newest wave is see-through).
     Peak kept at the binary 0.30; floor raised 0.10→0.20 because at iPhone scale the raw 0.10 start
     read as nearly invisible, whereas the 実機 O-ring stays a clearly visible translucent band
     (measured ≈0.30 single / ≈0.45 where two waves overlap). */
  from { opacity: 0.20; }
  to   { opacity: 0.30; }
}

/* Wavy circles */
.wavy-wrap {
  position: absolute;
  z-index: 4;
  border-radius: 50%;
  overflow: hidden;
  display: none;
  width: 68px; height: 68px;
  background: transparent;
}
.wavy-wrap.white-fill {
  background: white;
}
.wavy-left  { top: 156px; left: calc(30.55% - 34px); }
.wavy-right { top: 156px; left: calc(69.45% - 34px); }
.wavy-wrap canvas { display: block; width: 68px; height: 68px; }

/* Blue gradient overlay for slide animation */
.hero-slide-bg {
  display: none;
}

/* Invisible slide overlay */
.slide-overlay {
  display: none !important;
}
.slide-track { opacity: 0; position: absolute; width: 252px; height: 36px;
  bottom: 16px; left: 50%; transform: translateX(-50%); }
.slide-thumb { width: 28px; height: 28px; background: white; border-radius: 50%;
  position: relative; left: 0; flex-shrink: 0; }

/* IDOLY PRIDE title - top-left under header */
.event-title {
  position: absolute;
  top: 92px; left: 8px;
  color: white;
  /* 実機タイトルの「Ｉ」のスラブセリフ・幾何学的な丸み・広い字間は【全角英字】の特徴。
     コード(Unity TitleText: NotoSansJP-Bold size40=約20px)どおり NotoSansJP-Bold で、
     文字列を全角(ＩＤＯＬＹ　ＰＲＩＤＥ)にすると実機と一致する。全角自体が広いので字間は最小。 */
  font-family: 'Noto Sans JP','Hiragino Sans',sans-serif;
  font-size: 22px; font-weight: 700; letter-spacing: 1.1px;
  z-index: 5; pointer-events: none;
}
/* Unity Date/Time Text: NotoSansJP-Bold size 32 (extracted from libil2cpp). */
.event-date, .event-time {
  position: absolute; left: 8px;
  color: white; font-size: 18px; font-weight: 700; line-height: 20px;
  font-family: 'Noto Sans JP','Hiragino Sans',sans-serif;
  z-index: 5; display: flex; align-items: center; gap: 7px;
  pointer-events: none;
}
/* カレンダー(日付)はもう少し下へ。時計＋開場開演時間は下端寄せのまま（ヒーロー最下部）。 */
/* 日付と開場/開演の余白を実機(約12px)に拡大: 日付を少し上げる。時刻は下端寄せのまま。 */
.event-date { bottom: 38px; }
.event-time { bottom: 10px; }
/* 実機アセット Texture2D/entry_icon_date.png・entry_icon_time.png（白, 元36×36, 透明余白あり）。青ヒーロー上に白でそのまま。
   実機の字形は約15px。元画像に透明余白があるため18px指定で字形≈15pxに合わせる。 */
.event-date img, .event-time img { width: 18px; height: 18px; display: block; flex-shrink: 0; transform: translateY(1px); }

/* ===== WARNING BANNER ===== */
.warning-banner {
  background: #ff0000; color: white;
  font-size: 14.5px; line-height: 1.35; font-weight: 700;
  font-family: 'Noto Sans JP','Hiragino Sans',sans-serif;
  padding: 7px 10px 8px;
  display: none; flex-shrink: 0;
}

/* ===== TICKET AREA ===== */
.ticket-section { padding: 33px 9px 16px; background: #e6e6e6; flex: 1; flex-grow: 1; min-height: 200px;
  overflow-y: auto;
}

.ticket-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 11px;
}
/* 実機計測: 「お手持ちのチケット」「合計X枚」の字高 ≈19px → font-size 20px（旧24pxは大きすぎ）。 */
.ticket-header span { font-size: 22px; color: #171513; font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; font-weight: 400; line-height: 1.1; }

/* Ticket card with shadow matching reference image */
.ticket-card {
  background: transparent;
  overflow: visible;
  position: relative;
  /* 影は .ticket-inner のマスク後の実形状（ノッチ込み）に沿わせるため filter: drop-shadow を使用。
     box-shadow は矩形ベースでノッチ輪郭に回り込まないため、ここでは使わない。
     値は実機計測の密着型（下端α≈0.25・極小ブラー）。 */
  filter:
    drop-shadow(0 2px 5px rgba(0,0,0,0.24))
    drop-shadow(0 0 1px rgba(0,0,0,0.16));
  transition: background 0.3s;
}
/* inner clip for background color */
.ticket-inner {
  border-radius: 5px;
  overflow: hidden;
  position: relative;
  background: white;
  z-index: 1;
  /* 上下端(左から84.4%)に半径5.5pxの半円ノッチを切り抜く。
     2つの円(上端・下端)を mask-composite: intersect で同時に抜く。
     抜いた箇所は背後の地色が見え、親(.ticket-card)の drop-shadow がこの輪郭に沿って影を落とす
     → カード縁の影がノッチに回り込む（実機どおり）。 */
  -webkit-mask-image:
    radial-gradient(circle 5.5px at 84.4% 0%, transparent 5.5px, #000 5.6px),
    radial-gradient(circle 5.5px at 84.4% 100%, transparent 5.5px, #000 5.6px);
  -webkit-mask-composite: source-in;
  mask-image:
    radial-gradient(circle 5.5px at 84.4% 0%, transparent 5.5px, #000 5.6px),
    radial-gradient(circle 5.5px at 84.4% 100%, transparent 5.5px, #000 5.6px);
  mask-composite: intersect;
}
/* Selected state: Zashu(seat) + main row both turn blue. Footer stays white.
   Implementation matches Unity behavior — the dashed-line/notch separator only sits between
   info and footer, so the entire upper area (seat + main) is one continuous blue region. */
.ticket-card.selected .ticket-type,
.ticket-card.selected .ticket-main { background: #0083c4; }
.ticket-card.selected .ticket-footer { background: white !important; }
.ticket-footer { border-top: 1px solid #d8d8d8; }

/* 入場済 stamp — Unity Entered (pid=1885):
   size=340x112 at pos (-13,-13) anchor(1,1) pivot(1,1), rotation=identity (sprite art is pre-skewed).
   Card width 712 → stamp width 340/712 = 47.7%. Inset 13/2 = 6.5px from each edge.
   Color rgba(255,64,129, 0.502) → opacity 0.5. */
.nyujozumi-stamp {
  position: absolute;
  top: 2px;
  right: 1px;
  width: 51.5%;
  height: auto;
  pointer-events: none;
  display: none;
  z-index: 10;
  /* 実機画像の入場済領域から抽出した代表色は
     平均RGB ≒ (238,153,182) / 中央値RGB ≒ (240,147,178)。
     それに寄せるため、彩度はやや抑えつつ不透明度を上げる。 */
  opacity: 0.79;
  filter: saturate(0.96) brightness(1.00) hue-rotate(2deg);
}

.ticket-main {
  padding: 0 0 15px 15px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; user-select: none;
  transition: background 0.3s;
  position: relative;
}
/* Unity Zashu Text (pid=2529): NotoSansJP-Regular 32 #323232, pos.x=114 width=512 in 712-wide card.
   Standalone top row of the card; text is centered within its rect. */
/* 実機: 「１Ｆ 全自由 ＜チケットのみ＞」は中央寄せではなく、整理番号・氏名と同じ左端(情報列, 約67px)に左寄せ。 */
.ticket-type {
  font-size: 18px;
  color: #323232;
  text-align: left;
  padding: 11px 14px 14px 63px;
  font-family: 'Noto Sans JP','Hiragino Sans',sans-serif;
  font-weight: 400;
  transition: color 0.3s;
  position: relative;
}
.ticket-card.selected .ticket-type { color: rgba(255,255,255,0.95); }

/* Unity StatusIcon Text: NotoSansJP-Bold size 20, color #005186 (extracted from libil2cpp). */
/* 実機: アバター⌀≈38px。情報ブロック全体の中央ではなく上部(整理番号の高さ)に左寄せで配置。
   → align-self:flex-start で行の上側へ。整理番号の行に視覚的に合うよう少しだけ下げる。 */
.avatar-circle {
  width: 38px; height: 38px;
  border: 1px solid #005186; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #005186; font-weight: 700;
  font-family: 'Noto Sans JP','Hiragino Sans',sans-serif;
  white-space: nowrap; line-height: 1; letter-spacing: -0.5px; transform: translateY(-1px);
  flex-shrink: 0;
  background: #fff;
  transition: background 0.3s;
  /* 実機: アバター中心は整理番号の中心より少し下(小川の行付近)。上寄せ＋margin-topで調整。 */
  align-self: flex-start;
  margin-top: 8px;
}
/* アバター内側の背景は周囲の地色に追従（未選択=白 / 選択=青 / 入場済=グレー）。 */
.ticket-card.selected .avatar-circle { background: #0086c8; }
.ticket-card.entered .avatar-circle { background: #eeeeee; }

.ticket-info { flex: 1; min-width: 0; padding-right: 8px; }
/* Unity SheatNum Text: NotoSansJP-Bold size 40, color #323232 (extracted from libil2cpp). */
/* 実機比率(整理番号:席種:氏名 ≈ 1.0:0.8:0.57, code 40:32:24 と一致)に合わせ整理番号を22pxに。 */
.ticket-number {
  font-size: 22px; font-weight: 700; color: #323232; margin-bottom: 1px;
  letter-spacing: -0.5px;
  font-family: 'Noto Sans JP','Hiragino Sans',sans-serif;
}
.ticket-card.selected .ticket-main .ticket-number { color: white; }
/* Unity Name/PhoneNum/Price Text: all NotoSansJP-Regular size 24, color #323232 (extracted from libil2cpp). */
/* 実機比率: 氏名/電話/金額 ≈ 整理番号×0.57 → 13px（旧15は大きすぎ）。 */
.ticket-detail { font-size: 14px; color: #323232; line-height: 1.34; letter-spacing: -0.2px; font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; font-weight: 400; }
.ticket-card.selected .ticket-main .ticket-detail { color: rgba(255,255,255,0.9); }
.entry-time {
  font-size: 14px;
  line-height: 1.34;
}

/* 右端のチェックボックス領域 - デフォルトは透明、選択時に青 */
.checkbox-zone {
  width: 67px;
  background: transparent;
  display: flex;
  align-items: flex-start;   /* チェックを上側(整理番号〜小川の高さ)に */
  justify-content: center;
  flex-shrink: 0;
  align-self: stretch;
  transition: background 0.25s;
}
.checkbox-zone.hidden { display: none; }

/* 選択時：青ゾーン背景を表示 */
.ticket-card.selected .checkbox-zone {
  background: #0083c4;
}

/* チェックボックス本体：未選択時は白背景＋グレー枠 */
.checkbox {
  width: 24px; height: 24px;
  border: 2px solid #c8c8c8;
  border-radius: 4px;
  background: white;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 13px;   /* 整理番号〜小川の高さに合わせる(アバターと同レベル) */
  transition: all 0.25s;
}

/* Selected: keep white interior, lighter border (matches screenshot — checkbox stays a thin square with pink check). */
.ticket-card.selected .checkbox {
  border-color: #00699d;
  background: #0077b4;
}

/* Checked state — only the pink ✓ glyph appears via .checkbox.checked::after; background stays per selected/default rules above. */
/* Unity ticket_icon_check sprite color: rgba(255,64,129,1.0) = #FF4081 (pink). */
.checkbox.checked::after {
  content: '';
  width: 14px;
  height: 8px;
  border-left: 4px solid #FF4081;
  border-bottom: 4px solid #FF4081;
  border-radius: 1px;
  transform: rotate(-45deg) translate(1px, -1px);
  transform-origin: center;
  display: block;
}
.checkbox.hidden { display: none; }

/* 実機: チケット部分に点線（ticket_line_dots）は無い。info と footer の境界は
   .ticket-footer の上罫線（border-top 1px）だけ。旧 .ticket-notch（点線＋左右半円）は廃止。 */
.ticket-notch { display: none; }

/* ノッチは .ticket-inner の mask（半円カット）＋ .ticket-card の filter: drop-shadow で
   完全再現（影がノッチ輪郭に回り込む）。旧 ::before/::after の半円オーバーレイは廃止。 */

/* 区切り線は不要との指定 → border-top を削除。 */
.ticket-footer {
  padding: 14px 17px 15px 68px;
  display: flex; justify-content: space-between; align-items: center;
  position: relative;
  z-index: 2;
}
.ticket-footer::before,
.ticket-footer::after {
  content: none;
}

.ticket-type::before,
.ticket-type::after {
  content: none;
}

/* 実機比率: footer「ご来場までに…」≈ 17px（整理番号×0.77）。文字色は実機実測 #323232（旧#555は薄すぎ）。 */
.ticket-footer span { font-size: 18px; color: #323232; font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; font-weight: 400; line-height: 1.1; }
.ticket-card.selected .ticket-footer span { color: #323232; }
.ticket-footer svg { fill: #8e8e8e; width: 24px; height: 24px; transform: translateY(1px); opacity: 0.92; }
.ticket-card.selected .ticket-footer svg { fill: #999; }

.ticket-card.entered .ticket-inner {
  background: #eeeeee;
}
.ticket-card.entered .ticket-type,
.ticket-card.entered .ticket-main,
.ticket-card.entered .ticket-footer {
  background: #eeeeee;
}
.ticket-card.entered .ticket-main {
  padding-bottom: 13px;
}
.ticket-card.entered .ticket-detail {
  line-height: 1.34;
}
.ticket-card.entered .ticket-footer {
  border-top-color: transparent;
  padding-top: 13px;
}

/* ===== BOTTOM NAV =====
   Unity Footer/Background m_Color: (218,236,248) = #DAECF8.
   Footer/Back & Footer/Next bg #DDECF7 — almost identical to footer bg, so buttons are visually flat in real app.
   Footer/{Back,Next}/Title NotoSansJP-Regular size 28 color #0074BD.
   Footer/{Back,Next}/Icon footer_arrow 48x48 color #0074BD. */
.bottom-nav-outer {
  background: #DAECF8;
  border-top: none;
  /* 実機は矢印が画面端から約11px。横paddingを20px→10pxに詰める。 */
  padding: 12px 9px calc(env(safe-area-inset-bottom, 0px) + 12px);
  flex-shrink: 0;
}
.bottom-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: transparent;
}
.nav-back, .nav-next {
  display: flex;
  align-items: center;
  gap: 9px;
  color: #0074BD;
  font-family: 'Noto Sans JP','Hiragino Sans',sans-serif;
  /* 実機比率(390幅で約15.2px)。15 Pro Max(430幅)では相対的に小さく見えるため 16.5px に。 */
  font-size: 16.5px;
  font-weight: 400;
  line-height: 1;
  cursor: pointer;
  user-select: none;
  transform: translateY(1px);
}
/* 実機アセット Texture2D/footer_arrow.png（元48×48）を #0074BD に着色して使用。
   旧テキスト矢印(← →)は字形が横長で実機より長く見えたため差し替え。左向きはCSSで反転。 */
.nav-back .nav-icon, .nav-next .nav-icon {
  display: flex; align-items: center; line-height: 1;
}
.nav-back .nav-icon img, .nav-next .nav-icon img {
  width: 24px; height: 24px; display: block;
}
.nav-back .nav-icon img { transform: scaleX(-1); }
</style>

  ctx.save();
  ctx.beginPath();
  ctx.arc(w/2, h/2, w/2, 0, Math.PI*2);
  ctx.clip();

  if(whiteFill){
    ctx.fillStyle = 'white';
    ctx.fillRect(0,0,w,h);
  }

  /* Chevron geometry derived from 実機 marker (circle ⌀≈194px in screenshot, ×0.33 → 64px canvas):
       row spacing ≈ 8px, half-period ≈ 9px, peak-to-baseline ≈ 4px, stroke ≈ 2.5px. */
  const sH  = 7.2;
  const zW  = 8.2;
  const amp = 3.8;
  const xOff = (offset * 9) % (zW * 2);

  /* 実機サンプル: marker chevron color = rgba(255,64,129) = #FF4081 (same Unity pink as the check glyph). */
  ctx.strokeStyle = whiteFill ? 'rgba(20,28,130,0.80)' : (strokeColor || '#FF4081');
  ctx.lineWidth   = whiteFill ? 2.4 : 2.35;
  ctx.lineJoin    = 'miter';

  for(let row = -1; row <= Math.ceil(h / sH) + 2; row++){
    const y = row * sH;
    ctx.beginPath();
    ctx.moveTo(-zW*2 + xOff, y);
    for(let x = -zW*2 + xOff; x <= w + zW*2; x += zW){
      ctx.lineTo(x + zW*0.5, y - amp);
      ctx.lineTo(x + zW,     y      );
    }
    ctx.stroke();
  }
  ctx.restore();
}
let wavyOff = 0, wavyRAF = null;
let wavyStrokeColor = '#FF4081';  // 実機 marker pink (#FF4081) on blue hero
let wavyWhiteFill = false;
function animateWavy(){
  wavyOff += 0.04;
  drawWavy(document.getElementById('cvLeft'),  wavyOff,       wavyStrokeColor, wavyWhiteFill);
  drawWavy(document.getElementById('cvRight'), wavyOff + 0.8, wavyStrokeColor, wavyWhiteFill);
  wavyRAF = requestAnimationFrame(animateWavy);
}
function stopWavy(){
  if(wavyRAF){ cancelAnimationFrame(wavyRAF); wavyRAF=null; }
}

/* ========== CHECKBOX TAP ========== */
function onTicketTap(){
  if(isCheckedIn) return;
  isSelected = !isSelected;
  const inner   = document.getElementById('ticketInner');
  const chk     = document.getElementById('checkbox');
  const warn    = document.getElementById('warningBanner');
  const cnt     = document.getElementById('ticketCount');
  const wl      = document.getElementById('wavyLeft');
  const wr      = document.getElementById('wavyRight');
  const overlay = document.getElementById('slideOverlay');

  if(isSelected){
    document.getElementById('ticketMain').style.background = '#0086c8';
    document.getElementById('ticketCard').classList.add('selected');
    chk.classList.add('checked');
    warn.style.display  = 'block';
    cnt.textContent     = '合計１／１枚';
    wl.style.display    = 'block';
    wr.style.display    = 'block';
    animateWavy();
    initSlide();
  } else {
    document.getElementById('ticketCard').classList.remove('selected');
    document.getElementById('ticketMain').style.background = '';
    chk.classList.remove('checked');
    warn.style.display  = 'none';
    cnt.textContent     = '合計１枚';
    wl.style.display    = 'none';
    wr.style.display    = 'none';
    stopWavy();
    document.getElementById('circlesRainbowBg').style.display = 'none';
  }
}

/* ========== SLIDE TO CHECK-IN ========== */
let slideInited = false;

/* ── lerp helper ── */
function lerpColor(r1,g1,b1, r2,g2,b2, t){
  return [Math.round(r1+(r2-r1)*t), Math.round(g1+(g2-g1)*t), Math.round(b1+(b2-b1)*t)];
}

/* ── Update hero visuals based on slide progress 0→1 ── */
function updateSlideVisuals(progress){
  const hero = document.getElementById('hero');
  const wl   = document.getElementById('wavyLeft');
  const wr   = document.getElementById('wavyRight');
  const heroW = hero.offsetWidth;
  const baseL = 83, baseR = 235;
  const maxShift = heroW * 0.40;
  const rb = document.getElementById('circlesRainbowBg');
  wl.style.left = (baseL  + progress * maxShift) + 'px';
  wr.style.left = (baseR  + progress * maxShift) + 'px';
  rb.style.left = (progress * maxShift) + 'px';
}

/* ── Reset hero visuals (slide released without completing) ── */
function resetSlideVisuals(){
  const wl = document.getElementById('wavyLeft');
  const wr = document.getElementById('wavyRight');
  const rb2 = document.getElementById('circlesRainbowBg');
  wl.style.transition = 'left 0.28s';
  wr.style.transition = 'left 0.28s';
  rb2.style.transition = 'left 0.28s';
  wl.style.left = '83px';
  wr.style.left = '235px';
  rb2.style.left = '0px';
  setTimeout(()=>{
    wl.style.transition = 'none';
    wr.style.transition = 'none';
    rb2.style.transition = 'none';
  }, 300);
}

function initSlide(){
  if(slideInited) return;
  slideInited = true;
  const hero = document.getElementById('hero');
  let dragging = false, startX = 0, curProgress = 0;
  const COMPLETE_THRESHOLD = 0.55;

  function getClientX(e){
    if(e.touches && e.touches.length >= 2){
      return (e.touches[0].clientX + e.touches[1].clientX) / 2;
    }
    return e.touches ? e.touches[0].clientX : e.clientX;
  }

  function onStart(e){
    if(!isSelected || isCheckedIn) return;
    // require 2 fingers for touch
    if(e.touches && e.touches.length < 2) return;
    e.preventDefault();
    dragging = true;
    startX = getClientX(e);
    curProgress = 0;
    const wl2 = document.getElementById('wavyLeft');
    const wr2 = document.getElementById('wavyRight');
    wl2.classList.add('white-fill');
    wr2.classList.add('white-fill');
    wavyWhiteFill = true;
    document.getElementById('circlesRainbowBg').style.display = 'block';
  }
  function onMove(e){
    if(!dragging) return;
    if(e.touches && e.touches.length < 2){ return; }
    e.preventDefault();
    const dx = getClientX(e) - startX;
    const heroW = hero.offsetWidth;
    curProgress = Math.max(0, Math.min(1, dx / (heroW * 0.78)));
    updateSlideVisuals(curProgress);
    if(curProgress >= COMPLETE_THRESHOLD) doCheckIn();
  }
  function onEnd(){
    if(!dragging) return;
    dragging = false;
    if(curProgress < COMPLETE_THRESHOLD){
      resetSlideVisuals();
      const wl3 = document.getElementById('wavyLeft');
      const wr3 = document.getElementById('wavyRight');
      wl3.classList.remove('white-fill');
      wr3.classList.remove('white-fill');
      wavyWhiteFill = false;
      document.getElementById('circlesRainbowBg').style.display = 'none';
      }
    curProgress = 0;
  }

  hero.addEventListener('touchstart', onStart, {passive:false});
  hero.addEventListener('touchmove',  onMove,  {passive:false});
  hero.addEventListener('touchend',   onEnd,   {passive:false});
  hero.addEventListener('mousedown', onStart);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup',   onEnd);
}

/* ========== DO CHECK-IN ========== */
function doCheckIn(){
  if(isCheckedIn) return;
  isCheckedIn = true;
  isSelected = false;

  const card    = document.getElementById('ticketCard');
  const inner   = document.getElementById('ticketInner');
  const chk     = document.getElementById('checkbox');
  const stamp   = document.getElementById('nyujozumi');
  const detail  = document.getElementById('ticketDetail');
  const wl      = document.getElementById('wavyLeft');
  const wr      = document.getElementById('wavyRight');
  const overlay = document.getElementById('slideOverlay');

  // Show stamp
  stamp.style.display = 'block';
  card.classList.add('entered');

  // Add check-in time (the moment slide completed = now)
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const ts  = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  detail.innerHTML += '<br><span class="entry-time">入場時間：' + ts + '</span>';

  // Revert hero and card
  document.getElementById('hero').classList.remove('selected-hero');
  document.getElementById('wavyLeft').classList.remove('white-fill');
  document.getElementById('wavyRight').classList.remove('white-fill');
  wavyWhiteFill = false;
  document.getElementById('wavyLeft').classList.remove('white-fill');
  document.getElementById('wavyRight').classList.remove('white-fill');
  document.getElementById('circlesRainbowBg').style.display = 'none';
  card.classList.remove('selected');
  inner.style.background = '';
  document.getElementById('ticketMain').style.background = '';

  // Hide checkbox zone (青ゾーンごと非表示)
  chk.classList.remove('checked');
  document.getElementById('checkboxZone').classList.add('hidden');

  // Hide wavy circles and overlay
  wl.style.display = 'none';
  wr.style.display = 'none';
  stopWavy();
  /* overlay removed */

  // Reset count, hide warning
  document.getElementById('ticketCount').textContent = '合計１枚';
  document.getElementById('warningBanner').style.display = 'none';
}

/* ========== RESET (更新ボタン) ========== */
/* ヘッダーの更新ボタンで、入場済(または選択中)の状態を最初の未選択状態へ戻す。 */
function resetEntry(){
  const card   = document.getElementById('ticketCard');
  const chk    = document.getElementById('checkbox');
  const stamp  = document.getElementById('nyujozumi');
  const detail = document.getElementById('ticketDetail');
  const wl     = document.getElementById('wavyLeft');
  const wr     = document.getElementById('wavyRight');
  const rb     = document.getElementById('circlesRainbowBg');

  // 入場時間の行(<br>入場時間：…)を削除して元の明細に戻す
  const idx = detail.innerHTML.indexOf('入場時間');
  if(idx >= 0){
    detail.innerHTML = detail.innerHTML.slice(0, idx).replace(/<br\s*\/?>\s*$/i, '');
  }

  // 状態フラグ
  isCheckedIn = false;
  isSelected  = false;

  // スタンプ・クラス
  stamp.style.display = 'none';
  card.classList.remove('entered');
  card.classList.remove('selected');

  // チェックボックス（再表示・チェック解除）
  chk.classList.remove('checked');
  document.getElementById('checkboxZone').classList.remove('hidden');

  // 背景・件数・警告
  document.getElementById('ticketInner').style.background = '';
  document.getElementById('ticketMain').style.background = '';
  document.getElementById('ticketCount').textContent = '合計１枚';
  document.getElementById('warningBanner').style.display = 'none';

  // 波マーカー（非表示・初期位置へ）
  stopWavy();
  wavyWhiteFill = false;
  [wl, wr].forEach(el => {
    el.style.display = 'none';
    el.classList.remove('white-fill');
    el.style.transition = 'none';
  });
  wl.style.left = '83px';
  wr.style.left = '235px';
  if(rb){ rb.style.display = 'none'; rb.style.left = '0px'; }
}

/* ====== SETTINGS ====== */
const DAYS_JP = ['日','月','火','水','木','金','土'];

function formatDate(dateStr){
  // dateStr = "2026-03-07"
  const [y,m,d] = dateStr.split('-').map(Number);
  const dow = new Date(y,m-1,d).getDay();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return y+'.'+String(m).padStart(2,'0')+'.'+String(d).padStart(2,'0')+'('+days[dow]+')';
}

function openSettings(){
  document.getElementById('settingsOverlay').style.display = 'block';
  const p = document.getElementById('settingsPanel');
  p.style.display = 'block';
  requestAnimationFrame(()=>{ p.style.transform = 'translateX(0)'; });
}

function closeSettings(){
  const p = document.getElementById('settingsPanel');
  p.style.transform = 'translateX(100%)';
  setTimeout(()=>{
    p.style.display = 'none';
    document.getElementById('settingsOverlay').style.display = 'none';
  }, 280);
}

function closeSettingsIfOutside(e){
  if(e.target === document.getElementById('settingsOverlay')) closeSettings();
}

function applySettings(){
  // イベント名
  const titleEl = document.getElementById('eventTitle');
  titleEl.innerHTML = document.getElementById('s_title').value;

  // 日付
  const dateVal = document.getElementById('s_date').value;
  document.getElementById('eventDate').textContent = formatDate(dateVal);

  // 時刻
  document.getElementById('eventOpenTime').textContent = document.getElementById('s_open').value;
  document.getElementById('eventStartTime').textContent = document.getElementById('s_start').value;

  // 席種
  document.getElementById('ticketType').textContent = document.getElementById('s_seat').value;

  // 整理番号
  document.getElementById('ticketNumber').textContent = document.getElementById('s_num').value;

  // 詳細（名前・電話・金額）
  const name  = document.getElementById('s_name').value;
  const tel   = document.getElementById('s_tel').value;
  const price = document.getElementById('s_price').value;
  document.getElementById('ticketDetail').innerHTML =
    name + '様<br>' + tel + '<br>' + price;

  closeSettings();
}

</script>
